<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sudoku Touch</title>
  <style>
    :root {
      --bg: #10131f;
      --panel: rgba(255,255,255,0.08);
      --panel2: rgba(255,255,255,0.13);
      --line: rgba(255,255,255,0.22);
      --thick: rgba(255,255,255,0.72);
      --text: #f3f6ff;
      --muted: rgba(243,246,255,0.65);
      --accent2: #ffd166;
      --bad: #ff6b6b;
      --good: #7cffb2;
      --given: #ffffff;
      --user: #9ee6ff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 25% 10%, rgba(119,216,255,0.18), transparent 32%),
                  radial-gradient(circle at 75% 85%, rgba(255,209,102,0.12), transparent 30%),
                  var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    .app {
      width: 100vw; height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 16px);
    }
    .top { width: min(94vw, 520px); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.04em; }
    .subtitle { margin-top: 3px; color: var(--muted); font-size: 12px; }
    .pill {
      background: var(--panel); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
      padding: 8px 12px; color: var(--muted); font-size: 12px; backdrop-filter: blur(10px); white-space: nowrap;
    }
    .board-wrap {
      width: min(94vw, 520px); aspect-ratio: 1 / 1; padding: 7px; border-radius: 24px;
      background: linear-gradient(145deg, rgba(255,255,255,0.20), rgba(255,255,255,0.04));
      box-shadow: 0 24px 80px rgba(0,0,0,0.42); border: 1px solid rgba(255,255,255,0.18);
    }
    .board {
      width: 100%; height: 100%; display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr);
      border: 2px solid var(--thick); border-radius: 18px; overflow: hidden; background: rgba(0,0,0,0.22);
    }
    .cell {
      position: relative; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: clamp(20px, 6.6vw, 34px); color: var(--user);
      background: rgba(255,255,255,0.035); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
    }
    .cell:nth-child(3n) { border-right-color: var(--thick); border-right-width: 2px; }
    .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom-color: var(--thick); border-bottom-width: 2px; }
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+73) { border-bottom: none; }
    .cell.given { color: var(--given); text-shadow: 0 0 16px rgba(255,255,255,0.18); background: rgba(255,255,255,0.065); }
    .cell.selected { background: rgba(119,216,255,0.30); box-shadow: inset 0 0 0 2px rgba(119,216,255,0.9); }
    .cell.peer { background: rgba(119,216,255,0.10); }
    .cell.same { background: rgba(255,209,102,0.15); }
    .cell.error { color: var(--bad); background: rgba(255,107,107,0.16); }
    .notes {
      position: absolute; inset: 3px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
      color: rgba(243,246,255,0.52); font-size: clamp(7px, 2.2vw, 12px); font-weight: 600; line-height: 1; pointer-events: none;
    }
    .note { display: flex; align-items: center; justify-content: center; }
    .controls { width: min(94vw, 520px); display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
    .num, .action {
      height: clamp(42px, 10.5vw, 58px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
      background: var(--panel); color: var(--text); font-size: clamp(18px, 5vw, 26px); font-weight: 800;
      backdrop-filter: blur(10px); box-shadow: 0 12px 26px rgba(0,0,0,0.22);
    }
    .num:active, .action:active { transform: scale(0.97); background: var(--panel2); }
    .num.used { opacity: 0.34; }
    .bottom { width: min(94vw, 520px); display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .action { font-size: 13px; font-weight: 750; height: 44px; border-radius: 13px; }
    .action.active { color: #111827; background: var(--accent2); border-color: rgba(255,255,255,0.38); }
    .message { min-height: 18px; font-size: 12px; color: var(--muted); text-align: center; width: min(94vw, 520px); }
    .message.win { color: var(--good); font-weight: 700; }
    @media (max-height: 720px) {
      .app { gap: 8px; } h1 { font-size: 22px; }
      .subtitle, .pill, .message { font-size: 11px; }
      .bottom .action { height: 38px; }
      .board-wrap { width: min(86vh, 94vw, 520px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div><h1>Sudoku</h1><div class="subtitle">Touch prototype</div></div>
      <div class="pill" id="status">Errori: 0 · Facile</div>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="controls" id="numbers"></div>
    <div class="bottom">
      <button class="action" id="notesBtn">Note</button>
      <button class="action" id="eraseBtn">Cancella</button>
      <button class="action" id="checkBtn">Check</button>
      <button class="action" id="newBtn">Nuovo</button>
    </div>
    <div class="message" id="message">Tocca una cella, poi scegli un numero.</div>
  </main>
  <script>
    const puzzles = [
      { puzzle: "530070000600195000098000060800060003400803001700020006060000280000419005000080079", solution: "534678912672195348198342567859761423426853791713924856961537284287419635345286179" },
      { puzzle: "000260701680070090190004500820100040004602900050003028009300074040050036703018000", solution: "435269781682571493197834562826195347374682915951743628519326874248957136763418259" },
      { puzzle: "300000000005009000200504000020000700160000058704310600000890100000067080000005437", solution: "347682591615739842289514376528946713163278954794351628456893127931467285872125437" },
      { puzzle: "000000907000420180000705026100904000050000040000507009920108000034059000507000000", solution: "462831957795426183381795426173984265659312748248567319926178534834259671517643892" }
    ];
    const boardEl = document.getElementById("board");
    const numbersEl = document.getElementById("numbers");
    const statusEl = document.getElementById("status");
    const messageEl = document.getElementById("message");
    const notesBtn = document.getElementById("notesBtn");
    const eraseBtn = document.getElementById("eraseBtn");
    const checkBtn = document.getElementById("checkBtn");
    const newBtn = document.getElementById("newBtn");
    let current = null, puzzle = [], solution = [], values = [], given = [], notes = [], selected = 0, noteMode = false, mistakes = 0;

    function startGame(index = Math.floor(Math.random() * puzzles.length)) {
      current = puzzles[index];
      puzzle = current.puzzle.split("").map(Number);
      solution = current.solution.split("").map(Number);
      values = puzzle.slice();
      given = puzzle.map(v => v !== 0);
      notes = Array.from({ length: 81 }, () => new Set());
      selected = puzzle.findIndex(v => v === 0);
      if (selected < 0) selected = 0;
      mistakes = 0;
      noteMode = false;
      notesBtn.classList.remove("active");
      messageEl.className = "message";
      messageEl.textContent = "Tocca una cella, poi scegli un numero.";
      render();
    }
    function rowOf(i) { return Math.floor(i / 9); }
    function colOf(i) { return i % 9; }
    function boxOf(i) { return Math.floor(rowOf(i) / 3) * 3 + Math.floor(colOf(i) / 3); }
    function isPeer(a, b) { return rowOf(a) === rowOf(b) || colOf(a) === colOf(b) || boxOf(a) === boxOf(b); }

    function render() {
      boardEl.innerHTML = "";
      const selectedValue = values[selected];
      for (let i = 0; i < 81; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        if (given[i]) cell.classList.add("given");
        if (i === selected) cell.classList.add("selected");
        else if (isPeer(i, selected)) cell.classList.add("peer");
        if (selectedValue && values[i] === selectedValue && i !== selected) cell.classList.add("same");
        if (values[i] && values[i] !== solution[i]) cell.classList.add("error");
        if (values[i]) {
          cell.textContent = values[i];
        } else {
          const notesBox = document.createElement("div");
          notesBox.className = "notes";
          for (let n = 1; n <= 9; n++) {
            const note = document.createElement("div");
            note.className = "note";
            note.textContent = notes[i].has(n) ? n : "";
            notesBox.appendChild(note);
          }
          cell.appendChild(notesBox);
        }
        cell.addEventListener("pointerdown", e => { e.preventDefault(); selected = i; render(); });
        boardEl.appendChild(cell);
      }
      renderNumbers();
      statusEl.textContent = "Errori: " + mistakes + " · Facile";
    }

    function renderNumbers() {
      numbersEl.innerHTML = "";
      for (let n = 1; n <= 9; n++) {
        const btn = document.createElement("button");
        btn.className = "num";
        btn.textContent = n;
        if (values.filter(v => v === n).length >= 9) btn.classList.add("used");
        btn.addEventListener("pointerdown", e => { e.preventDefault(); placeNumber(n); });
        numbersEl.appendChild(btn);
      }
    }

    function placeNumber(n) {
      if (given[selected]) { showMessage("Questa cella è fissa."); return; }
      if (noteMode) {
        if (values[selected]) return;
        notes[selected].has(n) ? notes[selected].delete(n) : notes[selected].add(n);
        render();
        return;
      }
      values[selected] = n;
      notes[selected].clear();
      if (n !== solution[selected]) {
        mistakes++;
        showMessage("Numero non corretto.");
      } else {
        for (let i = 0; i < 81; i++) if (isPeer(i, selected)) notes[i].delete(n);
        showMessage("Bene.");
      }
      if (isSolved()) {
        messageEl.className = "message win";
        messageEl.textContent = "Completato.";
      }
      render();
    }

    function eraseSelected() {
      if (given[selected]) { showMessage("Non puoi cancellare un numero iniziale."); return; }
      values[selected] = 0;
      notes[selected].clear();
      showMessage("Cella cancellata.");
      render();
    }

    function checkBoard() {
      let wrong = 0, empty = 0;
      for (let i = 0; i < 81; i++) {
        if (!values[i]) empty++;
        else if (values[i] !== solution[i]) wrong++;
      }
      if (wrong === 0 && empty === 0) {
        messageEl.className = "message win";
        messageEl.textContent = "Perfetto, sudoku completato.";
      } else if (wrong === 0) {
        showMessage("Nessun errore. Mancano " + empty + " celle.");
      } else {
        showMessage(wrong + " celle non corrette.");
      }
      render();
    }

    function isSolved() {
      for (let i = 0; i < 81; i++) if (values[i] !== solution[i]) return false;
      return true;
    }
    function showMessage(text) { messageEl.className = "message"; messageEl.textContent = text; }

    notesBtn.addEventListener("pointerdown", e => {
      e.preventDefault();
      noteMode = !noteMode;
      notesBtn.classList.toggle("active", noteMode);
      showMessage(noteMode ? "Modalità note attiva." : "Modalità normale.");
    });
    eraseBtn.addEventListener("pointerdown", e => { e.preventDefault(); eraseSelected(); });
    checkBtn.addEventListener("pointerdown", e => { e.preventDefault(); checkBoard(); });
    newBtn.addEventListener("pointerdown", e => {
      e.preventDefault();
      const currentIndex = puzzles.indexOf(current);
      startGame((currentIndex + 1) % puzzles.length);
    });

    window.addEventListener("keydown", e => {
      if (e.key >= "1" && e.key <= "9") placeNumber(Number(e.key));
      if (e.key === "Backspace" || e.key === "Delete" || e.key === "0") eraseSelected();
      if (e.key === "n" || e.key === "N") {
        noteMode = !noteMode;
        notesBtn.classList.toggle("active", noteMode);
      }
      if (e.key === "ArrowLeft") selected = Math.max(0, selected - 1);
      if (e.key === "ArrowRight") selected = Math.min(80, selected + 1);
      if (e.key === "ArrowUp") selected = Math.max(0, selected - 9);
      if (e.key === "ArrowDown") selected = Math.min(80, selected + 9);
      render();
    });

    startGame(0);
  </script>
</body>
</html>
