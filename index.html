<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DeltaV Prototype</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020610;color:#eef6ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}
canvas{display:block;width:100vw;height:100dvh;background:radial-gradient(circle at 25% 18%,rgba(80,130,255,.16),transparent 28%),radial-gradient(circle at 70% 82%,rgba(255,180,80,.09),transparent 26%),linear-gradient(180deg,#08142c,#020610)}
.hud{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;right:10px;display:flex;justify-content:space-between;gap:10px;pointer-events:none;z-index:10}
.panel{background:rgba(5,10,22,.55);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:9px 11px;backdrop-filter:blur(12px);box-shadow:0 12px 32px rgba(0,0,0,.32);font-size:12px;line-height:1.34;text-shadow:0 1px 4px rgba(0,0,0,.55);max-width:min(64vw,430px)}
.title{font-weight:750;color:#fff;margin-bottom:2px}.small{color:rgba(238,246,255,.72)}
.hint{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 134px);transform:translateX(-50%);width:min(94vw,700px);color:rgba(238,246,255,.70);text-align:center;font-size:12px;line-height:1.32;pointer-events:none;z-index:10;text-shadow:0 1px 5px rgba(0,0,0,.55)}
.turnZone{position:fixed;top:0;bottom:0;width:35vw;opacity:0;background:rgba(255,255,255,.023);pointer-events:none;z-index:7;transition:opacity 120ms}.turnZone.left{left:0;border-right:1px solid rgba(255,255,255,.035)}.turnZone.right{right:0;border-left:1px solid rgba(255,255,255,.035)}.turnZone.show{opacity:1}
.burnButton{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);transform:translateX(-50%);width:108px;height:108px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.18),rgba(255,255,255,.04) 66%),radial-gradient(circle at 50% 50%,rgba(255,145,62,.13),rgba(255,145,62,.02));box-shadow:0 18px 52px rgba(0,0,0,.38),inset 0 0 22px rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:850;letter-spacing:.12em;color:rgba(255,255,255,.9);pointer-events:none;z-index:9}.burnButton.active{background:radial-gradient(circle at 50% 35%,rgba(255,235,185,.52),rgba(255,130,55,.14) 66%),radial-gradient(circle at 50% 50%,rgba(255,118,42,.22),rgba(255,118,42,.03))}
.actions{position:fixed;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);z-index:11;display:flex;flex-direction:column;gap:8px}.hudBtn{pointer-events:auto;border:1px solid rgba(255,255,255,.16);background:rgba(8,14,28,.74);color:white;border-radius:12px;padding:10px 12px;min-width:80px;font-size:12px;backdrop-filter:blur(10px);box-shadow:0 10px 24px rgba(0,0,0,.28)}.hudBtn.active{background:rgba(255,211,127,.92);color:#0f1524}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud"><div class="panel"><div class="title">DeltaV combat prototype</div><div class="small">AI orbitale: il nemico non fugge verso l’esterno, flanka e torna verso il centro con burn comparabili ai tuoi.</div></div><div class="panel" id="readout"></div></div>
<div class="hint">Lati invisibili: ruota con RCS. Centro basso: burn. Laser automatico con cono stretto; marker rosso se il nemico è fuori schermo.</div>
<div class="turnZone left" id="leftGlow"></div><div class="turnZone right" id="rightGlow"></div><div class="burnButton" id="burnVisual">BURN</div>
<div class="actions"><button class="hudBtn" id="resetBtn">Reset</button><button class="hudBtn" id="newBtn">New</button></div>
<script>
(() => {
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),burnVisual=document.getElementById('burnVisual'),leftGlow=document.getElementById('leftGlow'),rightGlow=document.getElementById('rightGlow'),resetBtn=document.getElementById('resetBtn'),newBtn=document.getElementById('newBtn');
let W=0,H=0,DPR=1,last=performance.now(),time=0,stars=[],particles=[],bodies=[],planetDefs=[],systemSeed=Math.floor(Math.random()*900000)+100000;
const camera={zoom:.62,targetZoom:.62,desiredZoom:.62,zoomVel:0,zoomHold:0};
const input={leftIds:new Set(),rightIds:new Set(),burnIds:new Set()};
const sun={id:'sun',name:'Sol',type:'sun',x:0,y:0,r:150,mass:150000,a:[255,232,165],b:[255,125,44],seed:9};
const ship={x:0,y:0,vx:0,vy:0,angle:0,radius:12,turnInput:0,angularVelocity:0,turnRate:2.35,thrust:0,thrustTarget:0,thrustPower:160,fuel:1,burnFuelUse:.56,turnFuelUse:.36,fuelRegen:.14,rcsCooldown:0};
let prediction={points:[],scores:new Map(),closest:new Map(),primary:null,secondary:null,stableBody:null,impact:false};
let targetBody=null,enemies=[],beams=[],weaponCooldown=0;
const weapon={range:760,cone:Math.PI*.075,cooldown:.85,damage:1};
const systemBoundary={soft:6200,hard:9000,pull:34};
let escapeWarning=0;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rgb(a,o=1){return`rgba(${a[0]},${a[1]},${a[2]},${o})`}
function sd(a,b){return Math.atan2(Math.sin(b-a),Math.cos(b-a))}
function rngFactory(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^(t>>>15),1|t);r^=r+Math.imul(r^(r>>>7),61|r);return((r^(r>>>14))>>>0)/4294967296}}
function rr(r,min,max){return min+r()*(max-min)}function ri(r,min,max){return Math.floor(rr(r,min,max+1))}
const palette=[[[115,236,255],[35,110,220]],[[255,216,130],[180,82,50]],[[218,175,255],[76,56,148]],[[162,255,201],[39,140,120]],[[255,154,128],[140,58,68]],[[210,230,255],[80,105,160]],[[255,235,165],[160,130,48]]];
function resize(){DPR=Math.max(1,Math.min(2,devicePixelRatio||1));W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);stars=[];for(let i=0;i<520;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.15,a:Math.random()*.7+.18,l:Math.random()*.55+.45})}
function genSystem(seed,attempt=0){const r=rngFactory(seed+attempt*10007),count=ri(r,4,6),defs=[],base=[1500,2150,2850,3650,4550,5600];let last=-1;for(let i=0;i<count;i++){let rad=rr(r,70,135),ci=ri(r,0,palette.length-1);if(ci===last)ci=(ci+2)%palette.length;last=ci;defs.push({id:'p'+i,name:i===0?'Aster':'P'+i,or:base[i]+rr(r,-120,180),ang:rr(r,0,Math.PI*2),r:Math.round(rad),mass:Math.round(rad*rad*rr(r,220,340)),a:palette[ci][0],b:palette[ci][1],seed:rr(r,0,10),type:'planet'})}defs[0].or=rr(r,2400,3100);defs[0].ang=rr(r,.2,.9);defs[0].r=clamp(defs[0].r,96,130);defs[0].mass=Math.round(defs[0].r*defs[0].r*rr(r,320,420));return defs}
function overlap(defs){for(let i=0;i<defs.length;i++){let a=defs[i],ax=Math.cos(a.ang)*a.or,ay=Math.sin(a.ang)*a.or;for(let j=i+1;j<defs.length;j++){let b=defs[j],bx=Math.cos(b.ang)*b.or,by=Math.sin(b.ang)*b.or;if(Math.hypot(ax-bx,ay-by)<a.r+b.r+360)return true}}return false}
function validSystem(seed){for(let a=0;a<80;a++){let d=genSystem(seed,a);if(!overlap(d))return d}let d=genSystem(seed,999),step=Math.PI*2/d.length;for(let i=0;i<d.length;i++){d[i].ang=.35+i*step;d[i].or+=i*180}return d}
function bodyState(d){if(d.type==='sun')return{...d,x:0,y:0,vx:0,vy:0};return{...d,x:Math.cos(d.ang)*d.or,y:Math.sin(d.ang)*d.or,vx:0,vy:0}}
function updateBodies(){bodies=[bodyState(sun),...planetDefs.map(bodyState)]}
function toScreen(x,y){return{x:W/2+(x-ship.x)*camera.zoom,y:H/2+(y-ship.y)*camera.zoom}}
function gravityAt(x,y,bs=bodies){
  let soi=null,score=-1e9;
  for(const b of bs){
    if(b.type==='sun')continue;
    let d=Math.hypot(b.x-x,b.y-y)+.0001,soiR=b.r*8.5;
    if(d<soiR){
      let s=(1-d/soiR)*100+b.mass/(d*d+1);
      if(s>score){score=s;soi=b}
    }
  }

  let act=soi?[soi]:bs,ax=0,ay=0;
  for(const b of act){
    let dx=b.x-x,dy=b.y-y,d2=dx*dx+dy*dy,d=Math.sqrt(d2)+.0001;
    let safe=Math.max(d2,b.r*b.r*.82),well=b.type==='sun'?b.r*10:b.r*16;
    let boost=1+1.55*(well/(d+well)),g=b.mass*boost/safe;
    ax+=dx/d*g; ay+=dy/d*g;
  }

  // Outer stellar gravity boundary: not a wall, a progressive pull back to the system.
  const R=Math.hypot(x,y);
  if(R>systemBoundary.soft){
    const nx=-x/(R+.0001), ny=-y/(R+.0001);
    const t=clamp((R-systemBoundary.soft)/(systemBoundary.hard-systemBoundary.soft),0,1);
    const extra=systemBoundary.pull*t*t*(.35+.65*t);
    ax+=nx*extra; ay+=ny*extra;
  }

  return{ax,ay}
}
function effMass(b,r){let well=b.type==='sun'?b.r*10:b.r*16,boost=1+1.55*(well/(r+well));return b.mass*boost}
function reset(){updateBodies();const p=bodies.find(b=>b.id==='p0')||bodies.find(b=>b.type!=='sun');let R=Math.max(p.r*3.45,p.r+ship.radius+180),ang=Math.atan2(p.y,p.x)+Math.PI*.45;function place(a){let nx=Math.cos(a),ny=Math.sin(a),tx=-ny,ty=nx,c=Math.sqrt(effMass(p,R)/R);ship.x=p.x+nx*R;ship.y=p.y+ny*R;ship.vx=tx*c;ship.vy=ty*c;ship.angle=Math.atan2(ship.vy,ship.vx)}place(ang);ship.turnInput=0;ship.angularVelocity=0;ship.thrust=0;ship.thrustTarget=0;ship.fuel=1;particles=[];camera.zoom=.62;camera.targetZoom=.62;camera.desiredZoom=.62;camera.zoomVel=0;prediction=analyzePrediction();targetBody=p;spawnEnemy(p);updateUI()}
function newSystem(){systemSeed=Math.floor(Math.random()*900000)+100000;planetDefs=validSystem(systemSeed);time=0;reset()}
function spawnEnemy(playerPlanet){
  enemies=[];
  beams=[];
  weaponCooldown=0;

  const enemyPlanet = bodies.find(b => b.type !== 'sun' && b.id !== playerPlanet.id) || playerPlanet;
  const R = Math.max(enemyPlanet.r * 4.4, enemyPlanet.r + 320);
  const a = Math.atan2(enemyPlanet.y, enemyPlanet.x) + Math.PI * .78;
  const nx = Math.cos(a), ny = Math.sin(a), tx = -ny, ty = nx;
  const c = Math.sqrt(effMass(enemyPlanet, R) / R);

  enemies.push({
    x: enemyPlanet.x + nx * R,
    y: enemyPlanet.y + ny * R,
    vx: tx * c,
    vy: ty * c,
    angle: Math.atan2(ty, tx),
    radius: 13,
    hp: 6,
    maxHp: 6,
    hitFlash: 0,
    hpVisible: 0,
    alive: true,
    orbitPlanetId: enemyPlanet.id,
    aiState: 'patrol',
    turnRate: 1.15
  });
}
function analyzePrediction(){
  let speed=Math.hypot(ship.vx,ship.vy);
  if(speed<2.1&&ship.thrust<.03)return{points:[],scores:new Map(),closest:new Map(),primary:null,secondary:null,stableBody:null,impact:false,escape:false};

  let x=ship.x,y=ship.y,vx=ship.vx,vy=ship.vy,pts=[],scores=new Map(),closest=new Map(),dom=null,lastAng=0,acc=0;

  for(let i=0;i<430;i++){
    let g=gravityAt(x,y,bodies);
    vx+=g.ax*.085; vy+=g.ay*.085;
    x+=vx*.085; y+=vy*.085;
    pts.push({x,y});

    if(Math.hypot(x,y)>systemBoundary.hard){
      return{points:pts,scores,closest,primary:null,secondary:null,stableBody:null,impact:false,escape:true};
    }

    let best=null,inf=-1;
    for(const b of bodies){
      let dx=b.x-x,dy=b.y-y,d2=dx*dx+dy*dy,d=Math.sqrt(d2)+.0001;
      if(d<=b.r)return{points:pts,scores,closest,primary:best,secondary:null,stableBody:null,impact:true,escape:false};
      if(b.type==='sun')continue;
      let f=b.mass/Math.max(d2,b.r*b.r*.82);
      scores.set(b.id,(scores.get(b.id)||0)+f*2700);
      closest.set(b.id,Math.min(closest.get(b.id)??Infinity,d));
      if(f>inf){inf=f;best=b}
    }

    if(best){
      let a=Math.atan2(y-best.y,x-best.x);
      if(dom!==best.id){dom=best.id;lastAng=a;acc=0}
      else{
        acc+=sd(lastAng,a);lastAng=a;
        if(Math.abs(acc)>Math.PI*2*1.05&&pts.length>80)break
      }
    }
  }

  let ranked=[...bodies.filter(b=>b.type!=='sun')].sort((a,b)=>(scores.get(b.id)||0)-(scores.get(a.id)||0));
  return{points:pts,scores,closest,primary:ranked[0],secondary:ranked[1],stableBody:ranked[0],impact:false,escape:false}
}
function chooseTarget(){targetBody=prediction.primary||bodies.find(b=>b.type!=='sun')}
function updateZoom(dt){
  let rel=[prediction.primary,prediction.secondary].filter(Boolean);
  if(!rel.length&&targetBody)rel=[targetBody];

  let minX=ship.x,maxX=ship.x,minY=ship.y,maxY=ship.y;
  let pts=prediction.points;

  // If the trajectory is escaping, only include the early part. Do not turn the map into three dots.
  const maxSamples=prediction.escape?30:72;
  for(let i=0;i<pts.length&&i<maxSamples*8;i+=8){
    let p=pts[i];
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
  }

  for(const b of rel){
    let pad=b.r*2.55+145;
    minX=Math.min(minX,b.x-pad); maxX=Math.max(maxX,b.x+pad);
    minY=Math.min(minY,b.y-pad); maxY=Math.max(maxY,b.y+pad);
  }

  const liveEnemy=enemies.find(e=>e.alive);
  if(liveEnemy){
    const d=Math.hypot(liveEnemy.x-ship.x, liveEnemy.y-ship.y);
    if(d < 2100 && !prediction.escape){
      const pad=260;
      minX=Math.min(minX, liveEnemy.x-pad);
      maxX=Math.max(maxX, liveEnemy.x+pad);
      minY=Math.min(minY, liveEnemy.y-pad);
      maxY=Math.max(maxY, liveEnemy.y+pad);
    }
    if(d < 1300 && !prediction.escape){
      const combatPad=180;
      minX-=combatPad; maxX+=combatPad;
      minY-=combatPad; maxY+=combatPad;
    }
  }

  let fit=Math.min(W*.82/Math.max(520,maxX-minX),H*.74/Math.max(400,maxY-minY));

  if(liveEnemy && Math.hypot(liveEnemy.x-ship.x,liveEnemy.y-ship.y)<1500)fit=Math.min(fit,.58);
  if(prediction.escape)fit=Math.max(fit,.16); // never zoom out forever on escape

  camera.targetZoom=clamp(fit,.055,1.12);
  let delta=camera.targetZoom-camera.zoom,stiff=delta<0?9.5:4.2,damp=delta<0?7:5.5;
  camera.zoomVel+=delta*stiff*dt;
  camera.zoomVel*=Math.exp(-damp*dt);
  camera.zoomVel=clamp(camera.zoomVel,delta<0?-1.35:-.42,delta<0?.42:.42);
  camera.zoom+=camera.zoomVel*dt;
  if(Math.abs(delta)<.0025&&Math.abs(camera.zoomVel)<.006){camera.zoom=camera.targetZoom;camera.zoomVel=0}
}
function region(x,y){let bx=W/2,by=H-72,br=86,dx=x-bx,dy=y-by;if(dx*dx+dy*dy<br*br)return'burn';if(x<W*.47)return'left';if(x>W*.53)return'right';return'burn'}
function addPtr(id,r){if(r==='left')input.leftIds.add(id);if(r==='right')input.rightIds.add(id);if(r==='burn')input.burnIds.add(id);updateUI()}function clrPtr(id){input.leftIds.delete(id);input.rightIds.delete(id);input.burnIds.delete(id);updateUI()}function updateUI(){leftGlow.classList.toggle('show',input.leftIds.size>0);rightGlow.classList.toggle('show',input.rightIds.size>0);burnVisual.classList.toggle('active',input.burnIds.size>0)}
function spawnParticle(x,y,count,color){for(let i=0;i<count;i++){let a=Math.random()*Math.PI*2,s=40+Math.random()*150;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.3+Math.random()*.45,r:2+Math.random()*4,color:Math.random()<.55?color:'130,230,255'})}}
function findWeaponTarget(){let fx=Math.cos(ship.angle),fy=Math.sin(ship.angle),best=null,bd=1e9;for(const e of enemies){if(!e.alive)continue;let dx=e.x-ship.x,dy=e.y-ship.y,d=Math.hypot(dx,dy);if(d>weapon.range||d<1)continue;let a=Math.acos(clamp((dx/d)*fx+(dy/d)*fy,-1,1));if(a<=weapon.cone&&d<bd){best=e;bd=d}}return best}

function playerWeaponDangerAt(ex,ey,leadSeconds=0){
  const px=ship.x+ship.vx*leadSeconds;
  const py=ship.y+ship.vy*leadSeconds;
  const dx=ex-px,dy=ey-py,d=Math.hypot(dx,dy);
  if(d>weapon.range*1.22)return 0;

  const futureAngle=ship.angle+ship.angularVelocity*leadSeconds*.65;
  const fx=Math.cos(futureAngle),fy=Math.sin(futureAngle);
  const dot=clamp((dx/d)*fx+(dy/d)*fy,-1,1);
  const ang=Math.acos(dot);

  // Forecast uses a wider pre-threat cone than the real weapon cone.
  // This lets the enemy react before it is already dead.
  const forecastCone=weapon.cone*3.4;
  if(ang>forecastCone)return 0;

  const angleScore=1-ang/forecastCone;
  const rangeScore=1-d/(weapon.range*1.22);
  const ready=weaponCooldown<=.35?1:.50;
  return clamp(angleScore*.78+rangeScore*.22,0,1)*ready;
}

function playerWeaponDanger(e){
  const now=playerWeaponDangerAt(e.x,e.y,0);
  const near=playerWeaponDangerAt(e.x+e.vx*.75,e.y+e.vy*.75,.75);
  const soon=playerWeaponDangerAt(e.x+e.vx*1.45,e.y+e.vy*1.45,1.45);
  return Math.max(now,near*.95,soon*.82);
}
function enemyBurn(e,dirAng,power,dur){
  // Enemy can cheat with fuel, not with feel: thrust stays comparable to player.
  e.burnTimer=dur;
  e.burnAngle=dirAng;
  e.burnPower=clamp(power,45,145);
  e.plumeTimer=dur+.12;
}

function mixAngles(a,b,t){
  return a + sd(a,b) * clamp(t,0,1);
}
function inwardBiasAngle(x,y){
  return Math.atan2(-y,-x);
}
function tangentToCenterAngle(x,y,preferSign=1){
  const radial=Math.atan2(y,x);
  return radial + preferSign * Math.PI/2;
}
function nonEscapeBurnAngle(e,baseAng,aggression=.5){
  // Prevent the AI from choosing a burn that points outward from the solar system.
  // Blend evasive direction with central/tangential direction so it circles and flanks instead of fleeing.
  const R=Math.hypot(e.x,e.y)+.0001;
  const outward=Math.atan2(e.y,e.x);
  const inward=outward+Math.PI;
  const sideSign = Math.sign(sd(outward, baseAng)) || (Math.random()<.5?-1:1);
  const tangential=outward + sideSign*Math.PI/2;

  // If already far out, strong inward bias. Otherwise prefer tangential flanking.
  const far=clamp((R-3600)/2600,0,1);
  let preferred=mixAngles(tangential,inward,far*.72);

  // Keep some intent from the base evasive angle, but never enough to become pure escape.
  let blended=mixAngles(preferred,baseAng,clamp(.28+aggression*.18,0,.46));

  // If final burn still has too much outward component, rotate toward tangent/inward.
  const outDot=Math.cos(blended-outward);
  if(outDot>.18) blended=mixAngles(blended, preferred, .72);

  return blended;
}
function enemyDesiredOrbitAngle(e){
  // General behaviour when not directly threatened: move around the player/system, not straight away.
  const R=Math.hypot(e.x,e.y)+.0001;
  const outward=Math.atan2(e.y,e.x);
  const playerAng=Math.atan2(ship.y-e.y,ship.x-e.x);
  const side=Math.sign(sd(outward,playerAng)) || 1;
  const tang=outward + side*Math.PI/2;
  const inward=outward + Math.PI;
  const far=clamp((R-4200)/2300,0,1);
  return mixAngles(tang,inward,far*.55);
}
function updateEnemies(dt){
  for(const e of enemies){
    if(!e.alive)continue;

    const dPlayer=Math.hypot(ship.x-e.x,ship.y-e.y);
    const danger=playerWeaponDanger(e);
    const sysR=Math.hypot(e.x,e.y);

    if(e.aiState==null)e.aiState='patrol';
    if(e.aiLock==null)e.aiLock=0;
    if(e.burnCooldown==null)e.burnCooldown=0;
    if(e.preferredSide==null)e.preferredSide=Math.random()<.5?-1:1;

    e.aiLock=Math.max(0,e.aiLock-dt);
    e.burnCooldown=Math.max(0,e.burnCooldown-dt);

    const canDecide=e.aiLock<=0;

    if(canDecide){
      if(sysR>systemBoundary.soft*.78){
        // Hard rule: never turn the fight into an outward chase.
        e.aiState='return_core';
        e.aiLock=1.45;
        e.burnCooldown=1.15;
        const burnAng=nonEscapeBurnAngle(e,inwardBiasAngle(e.x,e.y),.9);
        enemyBurn(e,burnAng,122,.62);
      } else if(danger>.62){
        e.aiState='emergency_flank';
        e.aiLock=1.20;
        e.burnCooldown=1.85;

        // Evade by cutting across the player's firing line, biased toward the system center.
        const away=Math.atan2(e.y-ship.y,e.x-ship.x);
        const lateral=away + e.preferredSide*Math.PI*.58;
        const burnAng=nonEscapeBurnAngle(e,lateral,.75);
        enemyBurn(e,burnAng,128,.58);
        e.preferredSide*=-1;
      } else if(danger>.26 || (dPlayer<weapon.range*1.85 && playerWeaponDangerAt(e.x+e.vx*1.7,e.y+e.vy*1.7,1.7)>.20)){
        e.aiState='pre_flank';
        e.aiLock=1.35;
        e.burnCooldown=2.35;

        // Anticipate the shot: slide to a new orbital lane, not away into deep space.
        const toPlayer=Math.atan2(ship.y-e.y,ship.x-e.x);
        const lateral=toPlayer + e.preferredSide*Math.PI*.64;
        const burnAng=nonEscapeBurnAngle(e,lateral,.45);
        enemyBurn(e,burnAng,88,.48);
      } else if(dPlayer<1850){
        e.aiState='circle_player';
        e.aiLock=.80;
      } else {
        e.aiState='patrol';
        e.aiLock=.95;
      }
    }

    let desiredAngle=null;

    if(e.aiState==='return_core'){
      desiredAngle=inwardBiasAngle(e.x,e.y);
    } else if(e.aiState==='emergency_flank' || e.aiState==='pre_flank'){
      desiredAngle=e.burnAngle;
    } else if(e.aiState==='circle_player'){
      // Circle/flank the player instead of jousting straight at them.
      const toPlayer=Math.atan2(ship.y-e.y,ship.x-e.x);
      desiredAngle=toPlayer + e.preferredSide*Math.PI*.42;
    } else {
      desiredAngle=enemyDesiredOrbitAngle(e);
    }

    if(desiredAngle!=null){
      const maxTurn=1.95; // comparable to player's 2.35, slightly worse.
      const delta=sd(e.angle,desiredAngle);
      e.angle+=clamp(delta,-maxTurn*dt,maxTurn*dt);
    }

    if(e.burnTimer>0){
      e.burnTimer-=dt;
      e.vx+=Math.cos(e.burnAngle)*e.burnPower*dt;
      e.vy+=Math.sin(e.burnAngle)*e.burnPower*dt;
    }

    e.plumeTimer=Math.max(0,(e.plumeTimer||0)-dt);

    // Controlled orbit-shaping impulses: limited, central/tangential, never outward chase.
    if((e.aiState==='patrol'||e.aiState==='circle_player') && e.burnCooldown<=0 && dPlayer<2400 && danger<.22){
      const base=enemyDesiredOrbitAngle(e);
      const burnAng=nonEscapeBurnAngle(e,base,.25);
      enemyBurn(e,burnAng,58,.30);
      e.burnCooldown=3.4+Math.random()*1.8;
    }

    let g=gravityAt(e.x,e.y);
    e.vx+=g.ax*dt;
    e.vy+=g.ay*dt;

    // Soft anti-escape velocity trim: only removes outward excess, does not create a visible wall.
    if(sysR>systemBoundary.soft*.72){
      const ox=e.x/(sysR+.0001), oy=e.y/(sysR+.0001);

        e.vx-=ox*outwardV*.018;
        e.vy-=oy*outwardV*.018;
      }
    }

    e.x+=e.vx*dt;
    e.y+=e.vy*dt;

    e.hitFlash=Math.max(0,e.hitFlash-dt);
    e.hpVisible=Math.max(0,e.hpVisible-dt);

    for(const b of bodies){
      if(Math.hypot(e.x-b.x,e.y-b.y)<b.r+e.radius){
        e.alive=false;
        spawnParticle(e.x,e.y,40,'255,110,70');
      }
    }
  }
}
function updateCombat(dt){weaponCooldown=Math.max(0,weaponCooldown-dt);for(let i=beams.length-1;i>=0;i--){beams[i].life-=dt;if(beams[i].life<=0)beams.splice(i,1)}let tar=findWeaponTarget();if(tar)tar.hpVisible=Math.max(tar.hpVisible,.35);if(tar&&weaponCooldown<=0){weaponCooldown=weapon.cooldown;tar.hp-=weapon.damage;tar.hitFlash=.16;tar.hpVisible=2.5;beams.push({x1:ship.x+Math.cos(ship.angle)*22,y1:ship.y+Math.sin(ship.angle)*22,x2:tar.x,y2:tar.y,life:.115,maxLife:.115});if(tar.hp<=0){tar.alive=false;spawnParticle(tar.x,tar.y,80,'255,130,70')}}}
function update(dt){time+=dt;updateBodies();let L=input.leftIds.size>0,R=input.rightIds.size>0,B=input.burnIds.size>0,turn=L&&!R?-1:R&&!L?1:0;ship.turnInput+=(turn-ship.turnInput)*Math.min(1,dt*(Math.abs(turn)>Math.abs(ship.turnInput)?3.2:5.5));let te=Math.sign(ship.turnInput)*ship.turnInput*ship.turnInput,tl=Math.abs(te);ship.angularVelocity+=(te*ship.turnRate-ship.angularVelocity)*Math.min(1,dt*6.6);ship.angle+=ship.angularVelocity*dt;if(tl>.03)ship.fuel-=ship.turnFuelUse*tl*dt;ship.thrustTarget=B&&ship.fuel>.01?1:0;ship.thrust+=(ship.thrustTarget-ship.thrust)*Math.min(1,dt*(ship.thrustTarget>ship.thrust?1:3.4));let th=ship.thrust*ship.thrust;if(th>.001)ship.fuel-=ship.burnFuelUse*th*dt;else ship.fuel+=ship.fuelRegen*dt;ship.fuel=clamp(ship.fuel,0,1);let g=gravityAt(ship.x,ship.y);ship.vx+=g.ax*dt;ship.vy+=g.ay*dt;if(th>.001&&ship.fuel>0){ship.vx+=Math.cos(ship.angle)*ship.thrustPower*th*dt;ship.vy+=Math.sin(ship.angle)*ship.thrustPower*th*dt;for(let i=0;i<3+th*5;i++)particles.push({x:ship.x-Math.cos(ship.angle)*12,y:ship.y-Math.sin(ship.angle)*12,vx:-Math.cos(ship.angle)*(80+Math.random()*90),vy:-Math.sin(ship.angle)*(80+Math.random()*90),life:.2+Math.random()*.2,r:2+Math.random()*3,color:'255,175,78'})}ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;for(const b of bodies)if(Math.hypot(ship.x-b.x,ship.y-b.y)<b.r+ship.radius)reset();prediction=analyzePrediction();escapeWarning=prediction.escape?1:Math.max(0,escapeWarning-dt*1.4);chooseTarget();updateZoom(dt);updateEnemies(dt);updateCombat(dt);for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1)}}
function bg(){for(const s of stars){let x=(s.x-((ship.x*.01)%W)*s.l+W*3)%W,y=(s.y-((ship.y*.01)%H)*s.l+H*3)%H;ctx.globalAlpha=s.a;ctx.fillStyle='white';ctx.beginPath();ctx.arc(x,y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawTraj(){let pts=prediction.points;if(pts.length<2)return;ctx.save();ctx.strokeStyle=prediction.impact||prediction.escape?'rgba(255,130,90,.78)':'rgba(110,236,255,.78)';ctx.lineWidth=1.35;ctx.shadowColor=prediction.impact||prediction.escape?'rgba(255,90,60,.44)':'rgba(72,210,255,.44)';ctx.shadowBlur=5;ctx.setLineDash([12,10]);ctx.lineDashOffset=-performance.now()*.03;let p=toScreen(pts[0].x,pts[0].y);ctx.beginPath();ctx.moveTo(p.x,p.y);for(let i=1;i<pts.length;i++){p=toScreen(pts[i].x,pts[i].y);ctx.lineTo(p.x,p.y)}ctx.stroke();ctx.restore()}
function drawBody(b){let s=toScreen(b.x,b.y),r=b.r*camera.zoom;if(s.x+r<0||s.x-r>W||s.y+r<0||s.y-r>H)return;let grad=ctx.createRadialGradient(s.x-r*.35,s.y-r*.4,Math.max(1,r*.08),s.x,s.y,Math.max(1,r));grad.addColorStop(0,rgb(b.a,1));grad.addColorStop(.58,rgb(b.b,1));grad.addColorStop(1,'rgba(20,20,30,.98)');ctx.fillStyle=grad;ctx.shadowColor=rgb(b.a,.22);ctx.shadowBlur=Math.max(8,r*.35);ctx.beginPath();ctx.arc(s.x,s.y,Math.max(1,r),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=Math.max(.4,r*.02);ctx.stroke()}
function drawOffscreenPlanets(){for(const b of bodies){if(b.type==='sun')continue;let s=toScreen(b.x,b.y),r=b.r*camera.zoom;if(s.x-r>0&&s.x+r<W&&s.y-r>0&&s.y+r<H)continue;let dx=s.x-W/2,dy=s.y-H/2,t=Math.min((W/2-5)/Math.max(.001,Math.abs(dx)),(H/2-5)/Math.max(.001,Math.abs(dy))),ex=W/2+dx*t,ey=H/2+dy*t,len=Math.max(.5,r*2);if(len<.5)continue;ctx.save();ctx.strokeStyle=rgb(b.a,.55);ctx.lineWidth=clamp(len*.1,.65,4.2);ctx.lineCap='round';if(Math.abs(ex-W/2)>Math.abs(ey-H/2)){let x=ex<W/2?5:W-5,y=clamp(ey,len/2+8,H-len/2-8);ctx.beginPath();ctx.moveTo(x,y-len/2);ctx.lineTo(x,y+len/2);ctx.stroke()}else{let y=ey<H/2?5:H-5,x=clamp(ex,len/2+8,W-len/2-8);ctx.beginPath();ctx.moveTo(x-len/2,y);ctx.lineTo(x+len/2,y);ctx.stroke()}ctx.restore()}}
function drawEnemyMarker(e){let s=toScreen(e.x,e.y),r=18;if(s.x+r>0&&s.x-r<W&&s.y+r>0&&s.y-r<H)return;let dx=s.x-W/2,dy=s.y-H/2,t=Math.min((W/2-10)/Math.max(.001,Math.abs(dx)),(H/2-10)/Math.max(.001,Math.abs(dy))),ex=W/2+dx*t,ey=H/2+dy*t,ang=Math.atan2(dy,dx),size=10;ctx.save();ctx.translate(ex,ey);ctx.rotate(ang);ctx.fillStyle='rgba(255,70,62,.9)';ctx.strokeStyle='rgba(255,230,220,.72)';ctx.lineWidth=1;ctx.shadowColor='rgba(255,65,55,.95)';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(size,0);ctx.lineTo(-size*.65,-size*.55);ctx.lineTo(-size*.35,0);ctx.lineTo(-size*.65,size*.55);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}
function drawWeaponArc(){
  const live=enemies.find(e=>e.alive);
  if(!live)return;

  const es=toScreen(live.x,live.y);
  const onScreen=es.x>0&&es.x<W&&es.y>0&&es.y<H;
  const d=Math.hypot(live.x-ship.x,live.y-ship.y);

  // If enemy is off-screen or very far, the red marker is enough.
  if(!onScreen || d>weapon.range*1.35)return;

  let tar=findWeaponTarget(),ready=weaponCooldown<=0,cx=W/2,cy=H/2,rad=weapon.range*camera.zoom;
  if(rad<34)return;

  let st=ship.angle-weapon.cone,en=ship.angle+weapon.cone;

  let edge=tar?(ready?.52:.30):.13;

  ctx.save();
  let gr=ctx.createRadialGradient(cx,cy,18,cx,cy,rad);
  gr.addColorStop(0,tar?'rgba(120,235,255,.08)':'rgba(120,235,255,.018)');
  gr.addColorStop(1,`rgba(120,235,255,${alpha})`);
  ctx.fillStyle=gr;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.arc(cx,cy,rad,st,en);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle=`rgba(130,240,255,${edge})`;
  ctx.lineWidth=tar?1.55:.9;
  ctx.shadowColor=tar?'rgba(105,235,255,.60)':'rgba(105,235,255,.22)';
  ctx.shadowBlur=tar?11:4;
  ctx.setLineDash([7,10]);
  ctx.lineDashOffset=-performance.now()*.018;
  ctx.beginPath();
  ctx.arc(cx,cy,rad,st,en);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.shadowBlur=0;
  ctx.strokeStyle=`rgba(130,240,255,${edge*.48})`;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(st)*30,cy+Math.sin(st)*30);
  ctx.lineTo(cx+Math.cos(st)*rad,cy+Math.sin(st)*rad);
  ctx.moveTo(cx+Math.cos(en)*30,cy+Math.sin(en)*30);
  ctx.lineTo(cx+Math.cos(en)*rad,cy+Math.sin(en)*rad);
  ctx.stroke();
  ctx.restore();
}
function drawEnemies(){let target=findWeaponTarget();for(const e of enemies){if(!e.alive)continue;drawEnemyMarker(e);let s=toScreen(e.x,e.y);if(s.x+30<0||s.x-30>W||s.y+30<0||s.y-30>H)continue;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(e.angle);if(e.plumeTimer>0){ctx.fillStyle=`rgba(255,95,60,${e.burnTimer>0?.66:.34})`;ctx.shadowColor='rgba(255,80,50,.85)';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(-14,-3);ctx.lineTo(-31,0);ctx.lineTo(-14,3);ctx.fill();ctx.shadowBlur=0;}ctx.fillStyle=e.hitFlash>0?'rgba(255,245,210,.98)':'rgba(255,116,92,.96)';ctx.strokeStyle='rgba(30,8,12,.76)';ctx.lineWidth=1.1;ctx.shadowColor=e.hitFlash>0?'rgba(255,210,150,.9)':'rgba(255,90,80,.42)';ctx.shadowBlur=e.hitFlash>0?22:12;ctx.beginPath();ctx.moveTo(17,0);ctx.lineTo(3,-6);ctx.lineTo(-7,-5);ctx.lineTo(-15,-10);ctx.lineTo(-10,0);ctx.lineTo(-15,10);ctx.lineTo(-7,5);ctx.lineTo(3,6);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();if(e===target){ctx.save();ctx.strokeStyle='rgba(255,95,82,.75)';ctx.shadowColor='rgba(255,70,58,.75)';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(s.x,s.y,22,0,Math.PI*2);ctx.stroke();ctx.restore()}if(e.hpVisible>0||e===target){let w=34,h=4,x=s.x-w/2,y=s.y-28;ctx.fillStyle='rgba(0,0,0,.48)';ctx.fillRect(x,y,w,h);ctx.fillStyle=e.hitFlash>0?'rgba(255,235,160,.95)':'rgba(255,104,90,.92)';ctx.fillRect(x,y,w*clamp(e.hp/e.maxHp,0,1),h);ctx.strokeStyle='rgba(255,255,255,.28)';ctx.strokeRect(x,y,w,h)}}}
function drawBeams(){for(const b of beams){let a=clamp(b.life/b.maxLife,0,1),s1=toScreen(b.x1,b.y1),s2=toScreen(b.x2,b.y2);ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='rgba(120,235,255,.92)';ctx.lineWidth=2.2;ctx.shadowColor='rgba(110,230,255,.95)';ctx.shadowBlur=14;ctx.beginPath();ctx.moveTo(s1.x,s1.y);ctx.lineTo(s2.x,s2.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.92)';ctx.lineWidth=.8;ctx.shadowBlur=0;ctx.beginPath();ctx.moveTo(s1.x,s1.y);ctx.lineTo(s2.x,s2.y);ctx.stroke();ctx.restore()}}

function drawShip(){ctx.save();ctx.translate(W/2,H/2);ctx.rotate(ship.angle);if(ship.thrust>.008){let tv=Math.max(.12,ship.thrust*ship.thrust),len=16+tv*40;let gr=ctx.createLinearGradient(-16,0,-20-len,0);gr.addColorStop(0,`rgba(255,255,255,${.4+tv*.42})`);gr.addColorStop(.35,`rgba(255,190,82,${.2+tv*.58})`);gr.addColorStop(1,'rgba(255,78,24,.02)');ctx.fillStyle=gr;ctx.shadowColor='rgba(255,120,52,.88)';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(-16,-4);ctx.lineTo(-20-len,0);ctx.lineTo(-16,4);ctx.fill();ctx.shadowBlur=0}ctx.fillStyle='#f3fbff';ctx.strokeStyle='rgba(6,14,28,.7)';ctx.lineWidth=1.2;ctx.shadowColor='rgba(100,225,255,.3)';ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(5,-7);ctx.lineTo(-5,-6);ctx.lineTo(-15,-13);ctx.lineTo(-10,-3);ctx.lineTo(-18,0);ctx.lineTo(-10,3);ctx.lineTo(-15,13);ctx.lineTo(-5,6);ctx.lineTo(5,7);ctx.closePath();ctx.fill();ctx.stroke();ctx.shadowColor='rgba(90,232,255,.95)';ctx.shadowBlur=12;ctx.fillStyle='rgba(90,232,255,.95)';ctx.beginPath();ctx.ellipse(5.5,0,4.6,2.7,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawFuel(){let x=18,y=H-86,w=160,h=12;ctx.fillStyle='rgba(0,0,0,.34)';ctx.fillRect(x,y,w,h);ctx.fillStyle=ship.fuel<.2?'rgba(255,120,120,.95)':'rgba(126,235,255,.95)';ctx.fillRect(x+1,y+1,(w-2)*ship.fuel,h-2);ctx.strokeStyle='rgba(255,255,255,.16)';ctx.strokeRect(x,y,w,h)}
