<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DeltaV Arcade v4</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #00030a;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #00030a;
    }

    #hud {
      position: fixed;
      z-index: 10;
      top: env(safe-area-inset-top, 0px);
      left: env(safe-area-inset-left, 0px);
      right: env(safe-area-inset-right, 0px);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: rgba(245, 248, 255, 0.9);
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.045em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.85);
      pointer-events: none;
    }

    .hudBlock {
      min-width: 118px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hudCenter {
      text-align: center;
      align-items: center;
      flex: 1;
    }

    .hudRight {
      text-align: right;
      align-items: flex-end;
    }

    #message {
      position: fixed;
      z-index: 12;
      left: 50%;
      bottom: calc(45px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      max-width: 82vw;
      text-align: center;
      color: rgba(245, 248, 255, 0.78);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    #leftZone, #rightZone {
      position: fixed;
      z-index: 20;
      top: 0;
      bottom: 0;
      width: 50vw;
      touch-action: none;
    }

    #leftZone { left: 0; }
    #rightZone { right: 0; }

    .zoneLabel {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #leftZone .zoneLabel {
      left: calc(18px + env(safe-area-inset-left, 0px));
    }

    #rightZone .zoneLabel {
      right: calc(18px + env(safe-area-inset-right, 0px));
    }

    #rotatePad, #thrustPad {
      position: fixed;
      z-index: 9;
      top: 50%;
      width: 76px;
      height: 76px;
      margin-top: -38px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.27);
      font-size: 10px;
      letter-spacing: 0.08em;
      pointer-events: none;
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(2px);
    }

    #rotatePad { left: 15vw; margin-left: -38px; }
    #thrustPad { right: 15vw; margin-right: -38px; }

    #resetButton {
      position: fixed;
      z-index: 30;
      right: calc(12px + env(safe-area-inset-right, 0px));
      bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (orientation: portrait) {
      #hud {
        padding: 12px 10px;
        font-size: 10px;
        gap: 5px;
      }

      .hudBlock {
        min-width: 84px;
      }

      #rotatePad {
        left: 25vw;
        top: 71%;
        width: 68px;
        height: 68px;
        margin-left: -34px;
        margin-top: -34px;
      }

      #thrustPad {
        right: 25vw;
        top: 71%;
        width: 72px;
        height: 72px;
        margin-right: -36px;
        margin-top: -36px;
      }

      .zoneLabel {
        bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        font-size: 10px;
      }

      #message {
        bottom: calc(94px + env(safe-area-inset-bottom, 0px));
        font-size: 11px;
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="hud">
    <div class="hudBlock">
      <div id="status">LANDED</div>
      <div id="altitude">ALT 0 m</div>
      <div id="cameraMode">CAM LANDING</div>
    </div>
    <div class="hudBlock hudCenter">
      <div id="velocity">VEL 0 m/s</div>
      <div id="verticalSpeed">V/S 0 m/s</div>
      <div id="planetRef">PLANET IN VIEW</div>
    </div>
    <div class="hudBlock hudRight">
      <div id="pitch">PITCH 0°</div>
      <div id="thrustHud">THRUST OFF</div>
      <div id="tip">LEFT: ROTATE</div>
    </div>
  </div>

  <div id="message">Hold right side to launch. Slide left side up/down to rotate.</div>
  <div id="leftZone"><div class="zoneLabel">slide to rotate</div></div>
  <div id="rightZone"><div class="zoneLabel">hold to thrust</div></div>
  <div id="rotatePad">ROTATE</div>
  <div id="thrustPad">THRUST</div>
  <button id="resetButton">reset</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const root = document.getElementById("game");

    const hud = {
      status: document.getElementById("status"),
      altitude: document.getElementById("altitude"),
      cameraMode: document.getElementById("cameraMode"),
      velocity: document.getElementById("velocity"),
      verticalSpeed: document.getElementById("verticalSpeed"),
      planetRef: document.getElementById("planetRef"),
      pitch: document.getElementById("pitch"),
      thrust: document.getElementById("thrustHud"),
      tip: document.getElementById("tip"),
      message: document.getElementById("message"),
      rotatePad: document.getElementById("rotatePad"),
      thrustPad: document.getElementById("thrustPad")
    };

    const leftZone = document.getElementById("leftZone");
    const rightZone = document.getElementById("rightZone");
    const resetButton = document.getElementById("resetButton");

    const TAU = Math.PI * 2;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function smoothstep(edge0, edge1, x) {
      const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }
    function normAngle(a) {
      while (a > Math.PI) a -= TAU;
      while (a < -Math.PI) a += TAU;
      return a;
    }

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x00030a, 1);
    root.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 10000);

    const world = new THREE.Group();
    scene.add(world);

    const ambient = new THREE.AmbientLight(0x8b9dff, 0.5);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 2.15);
    sun.position.set(-160, 220, 140);
    scene.add(sun);

    const rim = new THREE.DirectionalLight(0x5b7cff, 0.75);
    rim.position.set(210, 80, -220);
    scene.add(rim);

    const planetRadius = 42;
    const planet = {
      radius: planetRadius,
      mu: 6200,
      mesh: null
    };

    const planetGeo = new THREE.SphereGeometry(planet.radius, 96, 48);
    const planetMat = new THREE.MeshStandardMaterial({
      color: 0x2e5aa3,
      roughness: 0.72,
      metalness: 0.02,
      emissive: 0x071228,
      emissiveIntensity: 0.13
    });
    planet.mesh = new THREE.Mesh(planetGeo, planetMat);
    planet.mesh.rotation.z = 0.4;
    world.add(planet.mesh);

    const atmosphereGeo = new THREE.SphereGeometry(planet.radius * 1.025, 64, 32);
    const atmosphereMat = new THREE.MeshBasicMaterial({
      color: 0x6da6ff,
      transparent: true,
      opacity: 0.10,
      side: THREE.BackSide
    });
    const atmosphere = new THREE.Mesh(atmosphereGeo, atmosphereMat);
    world.add(atmosphere);

    const ringMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.11 });
    for (let i = -3; i <= 3; i++) {
      const points = [];
      const rr = Math.sqrt(Math.max(0.01, planet.radius * planet.radius - (i * planet.radius * 0.22) ** 2));
      for (let s = 0; s <= 160; s++) {
        const a = s / 160 * TAU;
        points.push(new THREE.Vector3(Math.cos(a) * rr, i * planet.radius * 0.22, Math.sin(a) * rr));
      }
      const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), ringMat);
      line.rotation.x = Math.PI / 2;
      world.add(line);
    }

    function createStars() {
      const starGeo = new THREE.BufferGeometry();
      const count = 2400;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 2400 + Math.random() * 5200;
        const theta = Math.random() * TAU;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      starGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 7,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.78
      });
      return new THREE.Points(starGeo, starMat);
    }
    scene.add(createStars());

    const distantPlanets = new THREE.Group();
    const dpData = [
      { pos: [720, 20, -1280], radius: 26, color: 0xb47d4e },
      { pos: [-1040, -10, -1700], radius: 38, color: 0x9aa2b2 },
      { pos: [1600, 80, 540], radius: 60, color: 0x5c78b8 },
      { pos: [-1550, 30, 900], radius: 18, color: 0xb7b0a2 }
    ];
    for (const p of dpData) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(p.radius, 32, 16),
        new THREE.MeshStandardMaterial({
          color: p.color,
          roughness: 0.78,
          emissive: p.color,
          emissiveIntensity: 0.035
        })
      );
      m.position.set(...p.pos);
      distantPlanets.add(m);
    }
    scene.add(distantPlanets);

    function makeShip() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(2.1, 8.5, 4),
        new THREE.MeshStandardMaterial({ color: 0xe8edff, roughness: 0.42, metalness: 0.18 })
      );
      // Cone points along local +Y by default. Rotate so nose points along local +Z.
      body.rotation.x = Math.PI / 2;
      body.position.z = 1.1;
      group.add(body);

      const rear = new THREE.Mesh(
        new THREE.CylinderGeometry(1.9, 1.9, 2.5, 12),
        new THREE.MeshStandardMaterial({ color: 0x9ba8c8, roughness: 0.48, metalness: 0.2 })
      );
      rear.rotation.x = Math.PI / 2;
      rear.position.z = -3.7;
      group.add(rear);

      const finMat = new THREE.MeshStandardMaterial({ color: 0x6c7da8, roughness: 0.45, metalness: 0.12 });
      for (const side of [-1, 1]) {
        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.55, 2.8, 2.1), finMat);
        fin.position.set(side * 1.95, -0.1, -3.1);
        fin.rotation.z = side * 0.22;
        group.add(fin);
      }

      const cockpit = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 16, 8),
        new THREE.MeshStandardMaterial({
          color: 0x6fb4ff,
          roughness: 0.2,
          metalness: 0.05,
          emissive: 0x143b66,
          emissiveIntensity: 0.2
        })
      );
      cockpit.scale.set(0.75, 0.38, 1);
      cockpit.position.set(0, 1.05, 1.3);
      group.add(cockpit);

      const flame = new THREE.Mesh(
        new THREE.ConeGeometry(1.3, 8, 18),
        new THREE.MeshBasicMaterial({ color: 0xff9b32, transparent: true, opacity: 0.0 })
      );
      // Flame points backward, out of the rear.
      flame.rotation.x = Math.PI / 2;
      flame.position.z = -7.8;
      flame.name = "flame";
      group.add(flame);

      return group;
    }

    const shipMesh = makeShip();
    world.add(shipMesh);
    const flame = shipMesh.getObjectByName("flame");

    const shadowGeo = new THREE.CircleGeometry(3.2, 32);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.0, depthWrite: false });
    const landingShadow = new THREE.Mesh(shadowGeo, shadowMat);
    landingShadow.rotation.x = -Math.PI / 2;
    world.add(landingShadow);

    const planetMarker = document.createElement("div");
    planetMarker.style.position = "fixed";
    planetMarker.style.zIndex = "35";
    planetMarker.style.width = "34px";
    planetMarker.style.height = "34px";
    planetMarker.style.marginLeft = "-17px";
    planetMarker.style.marginTop = "-17px";
    planetMarker.style.border = "1px solid rgba(255,255,255,0.22)";
    planetMarker.style.borderRadius = "50%";
    planetMarker.style.color = "rgba(255,255,255,0.75)";
    planetMarker.style.fontSize = "18px";
    planetMarker.style.display = "none";
    planetMarker.style.alignItems = "center";
    planetMarker.style.justifyContent = "center";
    planetMarker.style.pointerEvents = "none";
    planetMarker.style.textShadow = "0 2px 8px rgba(0,0,0,0.85)";
    planetMarker.textContent = "●";
    document.body.appendChild(planetMarker);

    const input = {
      thrust: false,
      rotateTouchId: null,
      rotateStartY: 0,
      rotateAmount: 0,
      keyboardRotate: 0
    };

    const ship = {
      x: 0,
      z: planet.radius,
      vx: 0,
      vz: 0,
      angle: Math.PI / 2,
      throttle: 0,
      thrustPower: 38,
      landed: true,
      crashed: false,
      groundGrace: 0,
      flightTime: 0
    };

    const camState = {
      mode: 0,
      pos: new THREE.Vector3(0, 85, 125),
      target: new THREE.Vector3(0, 0, 0),
      stableForward: new THREE.Vector3(0, 0, 1),
      planetScreenVisible: true
    };

    const worldUp = new THREE.Vector3(0, 1, 0);
    const tmp = new THREE.Vector3();
    const tmp2 = new THREE.Vector3();

    function get2D() {
      const r = Math.hypot(ship.x, ship.z);
      const nx = ship.x / Math.max(r, 0.0001);
      const nz = ship.z / Math.max(r, 0.0001);
      const altitude = r - planet.radius;
      const speed = Math.hypot(ship.vx, ship.vz);
      const radialSpeed = ship.vx * nx + ship.vz * nz;
      const localUpAngle = Math.atan2(nz, nx);
      const pitch = normAngle(ship.angle - localUpAngle);
      return { r, nx, nz, altitude, speed, radialSpeed, localUpAngle, pitch };
    }

    function resetShip() {
      ship.x = 0;
      ship.z = planet.radius;
      ship.vx = 0;
      ship.vz = 0;
      ship.angle = Math.PI / 2;
      ship.throttle = 0;
      ship.landed = true;
      ship.crashed = false;
      ship.groundGrace = 0;
      ship.flightTime = 0;
      input.thrust = false;
      camState.mode = 0;
      camState.stableForward.set(0, 0, 1);
      hud.message.textContent = "Hold right side to launch. Slide left side up/down to rotate.";
    }

    function updateShipMesh() {
      const info = get2D();
      const radial = new THREE.Vector3(info.nx, 0, info.nz);
      const forward = new THREE.Vector3(Math.cos(ship.angle), 0, Math.sin(ship.angle)).normalize();

      shipMesh.position.set(ship.x, 0, ship.z);
      shipMesh.position.add(radial.clone().multiplyScalar(2.8));

      // Correct orientation: local +Z is nose, aligned to forward.
      const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), forward);
      shipMesh.quaternion.copy(quat);

      const flameScale = 0.55 + ship.throttle * 1.9 + Math.random() * ship.throttle * 0.18;
      flame.scale.set(1, flameScale, 1);
      flame.material.opacity = ship.crashed ? 0 : ship.throttle * 0.78;

      if (info.altitude < 85 && !ship.landed) {
        const surfacePos = new THREE.Vector3(info.nx * planet.radius, 0.05, info.nz * planet.radius);
        landingShadow.position.copy(surfacePos);
        landingShadow.lookAt(surfacePos.clone().add(new THREE.Vector3(info.nx, 0, info.nz)));
        landingShadow.scale.setScalar(clamp(1 + info.altitude / 32, 1, 4.5));
        shadowMat.opacity = clamp(0.34 * (1 - info.altitude / 85), 0, 0.28);
      } else {
        shadowMat.opacity = 0;
      }
    }

    function updatePhysics(dt) {
      if (ship.crashed) {
        ship.throttle = lerp(ship.throttle, 0, 1 - Math.pow(0.0008, dt));
        return;
      }

      const info = get2D();
      const rotateInput = clamp(input.rotateAmount + input.keyboardRotate, -1, 1);
      const rotateSpeed = ship.landed ? 4.8 : 6.4;
      ship.angle += rotateInput * rotateSpeed * dt;

      ship.throttle = lerp(ship.throttle, input.thrust ? 1 : 0, 1 - Math.pow(0.000025, dt));

      if (ship.landed) {
        const up = info.localUpAngle;
        const maxLean = Math.PI * 0.48;
        ship.angle = up + clamp(normAngle(ship.angle - up), -maxLean, maxLean);

        const thrustX = Math.cos(ship.angle) * ship.thrustPower * ship.throttle;
        const thrustZ = Math.sin(ship.angle) * ship.thrustPower * ship.throttle;
        const outward = thrustX * info.nx + thrustZ * info.nz;
        const surfaceG = planet.mu / (planet.radius * planet.radius);

        if (outward > surfaceG * 1.004) {
          ship.landed = false;
          ship.groundGrace = 0.32;
          ship.flightTime = 0;
          const net = Math.max(0.05, outward - surfaceG);
          ship.vx = info.nx * net * 0.04;
          ship.vz = info.nz * net * 0.04;
          hud.message.textContent = "Lift-off. Keep thrust on, then pitch.";
        } else {
          ship.x = info.nx * planet.radius;
          ship.z = info.nz * planet.radius;
        }
        return;
      }

      ship.flightTime += dt;
      ship.groundGrace = Math.max(0, ship.groundGrace - dt);

      const gravity = planet.mu / (info.r * info.r);
      const gx = -info.nx * gravity;
      const gz = -info.nz * gravity;

      const tx = Math.cos(ship.angle) * ship.thrustPower * ship.throttle;
      const tz = Math.sin(ship.angle) * ship.thrustPower * ship.throttle;

      ship.vx += (gx + tx) * dt;
      ship.vz += (gz + tz) * dt;

      const lowAtmosphere = smoothstep(planet.radius + 56, planet.radius + 2, info.r);
      if (lowAtmosphere > 0) {
        const speed = Math.hypot(ship.vx, ship.vz);
        const drag = 0.014 * lowAtmosphere * speed;
        ship.vx -= ship.vx * drag * dt;
        ship.vz -= ship.vz * drag * dt;
      }

      ship.x += ship.vx * dt;
      ship.z += ship.vz * dt;

      const after = get2D();
      if (after.r <= planet.radius) {
        const impactSpeed = after.speed;
        const verticalImpact = Math.abs(after.radialSpeed);
        const angleError = Math.abs(after.pitch);

        if (ship.groundGrace <= 0 && impactSpeed < 29 && verticalImpact < 17 && angleError < Math.PI * 0.36) {
          ship.landed = true;
          ship.x = after.nx * planet.radius;
          ship.z = after.nz * planet.radius;
          ship.vx = 0;
          ship.vz = 0;
          ship.angle = after.localUpAngle;
          hud.message.textContent = "Touchdown. Hold thrust to launch again.";
        } else if (ship.groundGrace <= 0) {
          ship.crashed = true;
          ship.x = after.nx * planet.radius;
          ship.z = after.nz * planet.radius;
          ship.vx = 0;
          ship.vz = 0;
          ship.angle = after.localUpAngle;
          hud.message.textContent = "Crash. Tap RESET or press R.";
        }
      }
    }

    function projectToScreen(v) {
      const p = v.clone().project(camera);
      return {
        x: (p.x * 0.5 + 0.5) * window.innerWidth,
        y: (-p.y * 0.5 + 0.5) * window.innerHeight,
        z: p.z
      };
    }

    function updatePlanetMarker() {
      const p = projectToScreen(new THREE.Vector3(0, 0, 0));
      const margin = 36;
      const visible = p.z > -1 && p.z < 1 && p.x > margin && p.x < window.innerWidth - margin && p.y > margin && p.y < window.innerHeight - margin;
      camState.planetScreenVisible = visible;

      if (visible) {
        planetMarker.style.display = "none";
        return;
      }

      const cx = window.innerWidth * 0.5;
      const cy = window.innerHeight * 0.5;
      const angle = Math.atan2(p.y - cy, p.x - cx);
      const x = clamp(p.x, margin, window.innerWidth - margin);
      const y = clamp(p.y, margin, window.innerHeight - margin);

      planetMarker.style.display = "flex";
      planetMarker.style.left = `${x}px`;
      planetMarker.style.top = `${y}px`;
      planetMarker.style.transform = `rotate(${angle}rad)`;
    }

    function updateCamera(dt) {
      const info = get2D();
      const shipPos = new THREE.Vector3(ship.x, 0, ship.z);
      const radial = new THREE.Vector3(info.nx, 0, info.nz).normalize();
      const noseForward = new THREE.Vector3(Math.cos(ship.angle), 0, Math.sin(ship.angle)).normalize();

      const isLandingApproach =
        !ship.landed &&
        info.altitude < 130 &&
        info.radialSpeed < 5.5;

      let desiredMode;
      if (ship.landed || isLandingApproach || info.altitude < 38) {
        desiredMode = 0;
      } else {
        desiredMode = smoothstep(72, 260, info.altitude);
      }

      camState.mode = lerp(camState.mode, desiredMode, 1 - Math.pow(0.01, dt));

      // Stable chase direction: follows the nose, but slowly, to avoid disorientation.
      const forwardFollow = 1 - Math.pow(0.035, dt);
      camState.stableForward.lerp(noseForward, forwardFollow).normalize();

      const tangent = new THREE.Vector3(-info.nz, 0, info.nx).normalize();

      // LANDING: local ground is readable, but camera never rolls.
      const landingDistance = clamp(78 + info.altitude * 0.62, 76, 165);
      const landingHeight = clamp(46 + info.altitude * 0.15, 44, 88);
      const landingPos = shipPos
        .clone()
        .add(radial.clone().multiplyScalar(landingDistance))
        .add(tangent.clone().multiplyScalar(10))
        .add(worldUp.clone().multiplyScalar(landingHeight));
      const landingTarget = shipPos
        .clone()
        .lerp(radial.clone().multiplyScalar(planet.radius), 0.38)
        .add(worldUp.clone().multiplyScalar(1.5));

      // PILOT: readable third-person camera. No roll, slower rotation, ship remains large.
      const backDistance = clamp(35 + info.speed * 0.28, 35, 82);
      const upHeight = clamp(18 + info.speed * 0.08, 18, 35);
      const lookAhead = clamp(85 + info.speed * 1.7, 85, 260);
      const pilotPos = shipPos
        .clone()
        .add(camState.stableForward.clone().multiplyScalar(-backDistance))
        .add(worldUp.clone().multiplyScalar(upHeight));
      const pilotTarget = shipPos
        .clone()
        .add(camState.stableForward.clone().multiplyScalar(lookAhead))
        .add(worldUp.clone().multiplyScalar(4.5));

      const mixedPos = landingPos.lerp(pilotPos, camState.mode);
      const mixedTarget = landingTarget.lerp(pilotTarget, camState.mode);

      const follow = 1 - Math.pow(0.0012, dt);
      const targetFollow = 1 - Math.pow(0.0015, dt);
      camState.pos.lerp(mixedPos, follow);
      camState.target.lerp(mixedTarget, targetFollow);

      camera.position.copy(camState.pos);
      camera.up.copy(worldUp);
      camera.lookAt(camState.target);

      const targetFov = lerp(55, 62, camState.mode);
      camera.fov = lerp(camera.fov, targetFov, 1 - Math.pow(0.004, dt));
      camera.updateProjectionMatrix();

      if (camState.mode < 0.34) {
        hud.cameraMode.textContent = "CAM LANDING";
      } else if (camState.mode < 0.82) {
        hud.cameraMode.textContent = "CAM BLEND";
      } else {
        hud.cameraMode.textContent = "CAM PILOT";
      }
    }

    function updateHud() {
      const info = get2D();
      const realAlt = Math.max(0, info.altitude * 100);
      const realSpeed = info.speed * 12;
      const realVS = info.radialSpeed * 12;

      hud.status.textContent = ship.crashed ? "CRASHED" : ship.landed ? "LANDED" : "FLIGHT";
      hud.altitude.textContent = `ALT ${Math.round(realAlt)} m`;
      hud.velocity.textContent = `VEL ${Math.round(realSpeed)} m/s`;
      hud.verticalSpeed.textContent = `V/S ${Math.round(realVS)} m/s`;
      hud.planetRef.textContent = camState.planetScreenVisible ? "PLANET IN VIEW" : "PLANET MARKED";
      hud.pitch.textContent = `PITCH ${Math.round(info.pitch * 180 / Math.PI)}°`;
      hud.thrust.textContent = input.thrust ? `THRUST ${Math.round(ship.throttle * 100)}%` : "THRUST OFF";

      if (camState.mode > 0.82) {
        hud.tip.textContent = "PILOT VIEW";
      } else if (!ship.landed && info.altitude < 130) {
        hud.tip.textContent = "LANDING VIEW";
      } else {
        hud.tip.textContent = "LEFT: ROTATE";
      }
    }

    function animateWorld(dt) {
      planet.mesh.rotation.y += dt * 0.035;
      atmosphere.rotation.y -= dt * 0.012;
      distantPlanets.rotation.y += dt * 0.0013;
    }

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize);

    function handleLeftStart(e) {
      for (const t of e.changedTouches) {
        if (input.rotateTouchId === null) {
          input.rotateTouchId = t.identifier;
          input.rotateStartY = t.clientY;
          hud.rotatePad.style.opacity = "0.95";
          break;
        }
      }
      e.preventDefault();
    }

    function handleLeftMove(e) {
      for (const t of e.changedTouches) {
        if (t.identifier === input.rotateTouchId) {
          const dy = t.clientY - input.rotateStartY;
          input.rotateAmount = clamp(dy / 42, -1, 1);
          break;
        }
      }
      e.preventDefault();
    }

    function handleLeftEnd(e) {
      for (const t of e.changedTouches) {
        if (t.identifier === input.rotateTouchId) {
          input.rotateTouchId = null;
          input.rotateAmount = 0;
          hud.rotatePad.style.opacity = "1";
          break;
        }
      }
      e.preventDefault();
    }

    leftZone.addEventListener("touchstart", handleLeftStart, { passive: false });
    leftZone.addEventListener("touchmove", handleLeftMove, { passive: false });
    leftZone.addEventListener("touchend", handleLeftEnd, { passive: false });
    leftZone.addEventListener("touchcancel", handleLeftEnd, { passive: false });

    function thrustOn(e) {
      input.thrust = true;
      hud.thrustPad.style.opacity = "1";
      e.preventDefault();
    }

    function thrustOff(e) {
      input.thrust = false;
      hud.thrustPad.style.opacity = "1";
      e.preventDefault();
    }

    rightZone.addEventListener("touchstart", thrustOn, { passive: false });
    rightZone.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
    rightZone.addEventListener("touchend", thrustOff, { passive: false });
    rightZone.addEventListener("touchcancel", thrustOff, { passive: false });

    resetButton.addEventListener("click", resetShip);

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowUp" || e.code === "Space") input.thrust = true;
      if (e.code === "ArrowLeft") input.keyboardRotate = -1;
      if (e.code === "ArrowRight") input.keyboardRotate = 1;
      if (e.code === "KeyR") resetShip();
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowUp" || e.code === "Space") input.thrust = false;
      if (e.code === "ArrowLeft" || e.code === "ArrowRight") input.keyboardRotate = 0;
    });

    let last = performance.now();

    function loop(now) {
      const rawDt = (now - last) / 1000;
      last = now;
      const dt = Math.min(rawDt, 1 / 30);

      updatePhysics(dt);
      updateShipMesh();
      updateCamera(dt);
      updatePlanetMarker();
      updateHud();
      animateWorld(dt);

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    resetShip();
    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
