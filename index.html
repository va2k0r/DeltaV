<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DeltaV 3D Chase Camera Prototype</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030611;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 35%, #14203b 0%, #060916 48%, #01030a 100%);
    }

    .hud {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      font-size: 12px;
      line-height: 1.35;
      text-shadow: 0 1px 5px #000;
    }

    .panel {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 8px 10px;
      backdrop-filter: blur(8px);
      max-width: 48vw;
    }

    .burn-button {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      transform: translateX(-50%);
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.22);
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.20), rgba(255,255,255,0.07));
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      pointer-events: none;
      box-shadow: 0 16px 38px rgba(0,0,0,0.38);
      backdrop-filter: blur(8px);
    }

    .burn-button.active {
      background: radial-gradient(circle at 50% 35%, rgba(255,210,120,0.55), rgba(255,100,30,0.13));
      transform: translateX(-50%) scale(0.98);
    }

    .touch-hints {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .touch-hints.show {
      opacity: 1;
    }

    .left-hint, .right-hint {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 35%;
      background: rgba(255,255,255,0.035);
    }

    .left-hint {
      left: 0;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .right-hint {
      right: 0;
      border-left: 1px solid rgba(255,255,255,0.05);
    }

    .bottom-note {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 140px);
      transform: translateX(-50%);
      width: min(92vw, 520px);
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      opacity: 0.72;
      text-shadow: 0 1px 5px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="panel">
      DeltaV 3D chase prototype<br>
      Lati invisibili: turn left / turn right<br>
      Centro basso: burn progressivo
    </div>
    <div class="panel" id="readout">
      v 0<br>
      throttle 0%
    </div>
  </div>

  <div class="touch-hints" id="touchHints">
    <div class="left-hint"></div>
    <div class="right-hint"></div>
  </div>

  <div class="bottom-note">
    La linea azzurra è la traiettoria davanti alla nave. La linea arancione è la traiettoria dietro la nave, utile per capire quando sei retrograde.
  </div>

  <div class="burn-button" id="burnVisual">BURN</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const readout = document.getElementById('readout');
    const burnVisual = document.getElementById('burnVisual');
    const touchHints = document.getElementById('touchHints');

    let W = 0, H = 0, DPR = 1;
    let last = performance.now();

    const input = {
      leftIds: new Set(),
      rightIds: new Set(),
      burnIds: new Set()
    };

    const planets = [
      {
        name: "Aster",
        x: -720,
        y: 1050,
        r: 86,
        mass: 230000,
        color1: "#6ae5ff",
        color2: "#1c6fd1"
      },
      {
        name: "Vesta",
        x: 690,
        y: 1720,
        r: 128,
        mass: 470000,
        color1: "#ffd486",
        color2: "#ae5537"
      },
      {
        name: "Nox",
        x: -380,
        y: 2520,
        r: 58,
        mass: 120000,
        color1: "#caa8ff",
        color2: "#533c95"
      }
    ];

    const ship = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2,
      turnRate: 2.15,
      thrust: 0,
      thrustTarget: 0,
      thrustPower: 165,
      radius: 13
    };

    const camera = {
      x: 0, y: 0,
      angle: ship.angle,
      back: 185,
      height: 95,
      lookAhead: 430,
      fov: 620
    };

    let stars = [];

    function resize() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      makeStars();
    }

    function makeStars() {
      stars = [];
      for (let i = 0; i < 260; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          s: Math.random() * 1.8 + 0.25,
          a: Math.random() * 0.65 + 0.25
        });
      }
    }

    window.addEventListener("resize", resize);
    resize();

    function regionForPointer(clientX, clientY) {
      const burnR = 86;
      const burnCx = W / 2;
      const burnCy = H - 76;
      const dx = clientX - burnCx;
      const dy = clientY - burnCy;

      if (dx * dx + dy * dy < burnR * burnR) return "burn";
      if (clientX < W * 0.47) return "left";
      if (clientX > W * 0.53) return "right";
      return "burn";
    }

    function addPointer(id, region) {
      if (region === "left") input.leftIds.add(id);
      if (region === "right") input.rightIds.add(id);
      if (region === "burn") input.burnIds.add(id);
      updateTouchVisuals();
    }

    function clearPointer(id) {
      input.leftIds.delete(id);
      input.rightIds.delete(id);
      input.burnIds.delete(id);
      updateTouchVisuals();
    }

    function updateTouchVisuals() {
      const touching = input.leftIds.size || input.rightIds.size || input.burnIds.size;
      touchHints.classList.toggle("show", !!touching);
      burnVisual.classList.toggle("active", input.burnIds.size > 0);
    }

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      addPointer(e.pointerId, regionForPointer(e.clientX, e.clientY));
    });

    canvas.addEventListener("pointerup", (e) => {
      e.preventDefault();
      clearPointer(e.pointerId);
    });

    canvas.addEventListener("pointercancel", (e) => {
      e.preventDefault();
      clearPointer(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault();
      clearPointer(e.pointerId);
      addPointer(e.pointerId, regionForPointer(e.clientX, e.clientY));
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") input.leftIds.add("keyboard");
      if (e.key === "ArrowRight") input.rightIds.add("keyboard");
      if (e.key === "ArrowUp" || e.key === " ") input.burnIds.add("keyboard");
      updateTouchVisuals();
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") input.leftIds.delete("keyboard");
      if (e.key === "ArrowRight") input.rightIds.delete("keyboard");
      if (e.key === "ArrowUp" || e.key === " ") input.burnIds.delete("keyboard");
      updateTouchVisuals();
    });

    function gravityAt(x, y) {
      let ax = 0, ay = 0;
      for (const p of planets) {
        const dx = p.x - x;
        const dy = p.y - y;
        const d2 = dx * dx + dy * dy;
        const d = Math.sqrt(d2) + 0.0001;
        const safe = Math.max(d2, p.r * p.r * 0.82);
        const g = p.mass / safe;
        ax += (dx / d) * g;
        ay += (dy / d) * g;
      }
      return { ax, ay };
    }

    function update(dt) {
      const left = input.leftIds.size > 0;
      const right = input.rightIds.size > 0;
      const burn = input.burnIds.size > 0;

      if (left) ship.angle -= ship.turnRate * dt;
      if (right) ship.angle += ship.turnRate * dt;

      ship.thrustTarget = burn ? 1 : 0;

      const rampUp = 1.35;
      const rampDown = 2.9;
      const ramp = ship.thrustTarget > ship.thrust ? rampUp : rampDown;
      ship.thrust += (ship.thrustTarget - ship.thrust) * Math.min(1, dt * ramp);

      const g = gravityAt(ship.x, ship.y);
      ship.vx += g.ax * dt;
      ship.vy += g.ay * dt;

      if (ship.thrust > 0.002) {
        const power = ship.thrustPower * ship.thrust;
        ship.vx += Math.cos(ship.angle) * power * dt;
        ship.vy += Math.sin(ship.angle) * power * dt;
      }

      ship.x += ship.vx * dt;
      ship.y += ship.vy * dt;

      for (const p of planets) {
        const dx = ship.x - p.x;
        const dy = ship.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < p.r + ship.radius) {
          const nx = dx / d;
          const ny = dy / d;
          ship.x = p.x + nx * (p.r + ship.radius);
          ship.y = p.y + ny * (p.r + ship.radius);
          const radial = ship.vx * nx + ship.vy * ny;
          if (radial < 0) {
            ship.vx -= radial * nx * 1.35;
            ship.vy -= radial * ny * 1.35;
          }
          ship.vx *= 0.68;
          ship.vy *= 0.68;
        }
      }

      camera.angle = ship.angle;
      camera.x = ship.x - Math.cos(ship.angle) * camera.back;
      camera.y = ship.y - Math.sin(ship.angle) * camera.back;
    }

    function cameraBasis() {
      const forward2 = { x: Math.cos(camera.angle), y: Math.sin(camera.angle) };

      const cam = { x: camera.x, y: camera.height, z: camera.y };
      const target = {
        x: ship.x + forward2.x * camera.lookAhead,
        y: 0,
        z: ship.y + forward2.y * camera.lookAhead
      };

      let fx = target.x - cam.x;
      let fy = target.y - cam.y;
      let fz = target.z - cam.z;
      const fl = Math.hypot(fx, fy, fz);
      fx /= fl; fy /= fl; fz /= fl;

      const upx = 0, upy = 1, upz = 0;

      let rx = fy * upz - fz * upy;
      let ry = fz * upx - fx * upz;
      let rz = fx * upy - fy * upx;
      const rl = Math.hypot(rx, ry, rz);
      rx /= rl; ry /= rl; rz /= rl;

      let ux = ry * fz - rz * fy;
      let uy = rz * fx - rx * fz;
      let uz = rx * fy - ry * fx;

      return { cam, f: {x: fx, y: fy, z: fz}, r: {x: rx, y: ry, z: rz}, u: {x: ux, y: uy, z: uz} };
    }

    function projectWorld(x, y, height = 0) {
      const b = cameraBasis();
      const px = x, py = height, pz = y;
      const vx = px - b.cam.x;
      const vy = py - b.cam.y;
      const vz = pz - b.cam.z;

      const cx = vx * b.r.x + vy * b.r.y + vz * b.r.z;
      const cy = vx * b.u.x + vy * b.u.y + vz * b.u.z;
      const cz = vx * b.f.x + vy * b.f.y + vz * b.f.z;

      if (cz <= 8) return null;

      const scale = camera.fov / cz;
      return {
        x: W / 2 + cx * scale,
        y: H * 0.49 - cy * scale,
        z: cz,
        scale
      };
    }

    function drawStars() {
      ctx.save();
      for (const s of stars) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawGrid() {
      ctx.save();
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(255,255,255,0.06)";

      const spacing = 220;
      const extent = 3200;
      const startX = Math.floor((ship.x - extent) / spacing) * spacing;
      const endX = Math.ceil((ship.x + extent) / spacing) * spacing;
      const startY = Math.floor((ship.y - extent) / spacing) * spacing;
      const endY = Math.ceil((ship.y + extent) / spacing) * spacing;

      for (let gx = startX; gx <= endX; gx += spacing) {
        let started = false;
        ctx.beginPath();
        for (let gy = startY; gy <= endY; gy += 80) {
          const p = projectWorld(gx, gy, 0);
          if (!p) { started = false; continue; }
          if (!started) { ctx.moveTo(p.x, p.y); started = true; }
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      }

      for (let gy = startY; gy <= endY; gy += spacing) {
        let started = false;
        ctx.beginPath();
        for (let gx = startX; gx <= endX; gx += 80) {
          const p = projectWorld(gx, gy, 0);
          if (!p) { started = false; continue; }
          if (!started) { ctx.moveTo(p.x, p.y); started = true; }
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    function predictTrajectory() {
      const speed = Math.hypot(ship.vx, ship.vy);
      if (speed < 2.5 && ship.thrust < 0.04) return [];

      const points = [];
      let x = ship.x;
      let y = ship.y;
      let vx = ship.vx;
      let vy = ship.vy;

      const step = 0.075;
      const steps = 760;

      for (let i = 0; i < steps; i++) {
        const g = gravityAt(x, y);
        vx += g.ax * step;
        vy += g.ay * step;
        x += vx * step;
        y += vy * step;
        points.push({ x, y });

        for (const p of planets) {
          const dx = x - p.x;
          const dy = y - p.y;
          if (Math.sqrt(dx * dx + dy * dy) < p.r) return points;
        }
      }
      return points;
    }

    function drawDashedProjectedSegment(points, color, dashA, dashB, height, glow) {
      if (points.length < 2) return;

      ctx.save();
      ctx.lineWidth = 2.6;
      ctx.strokeStyle = color;
      ctx.shadowColor = glow;
      ctx.shadowBlur = 8;
      ctx.setLineDash([dashA, dashB]);
      ctx.lineDashOffset = -performance.now() * 0.035;

      let drawing = false;
      ctx.beginPath();

      for (let i = 0; i < points.length; i++) {
        const p = projectWorld(points[i].x, points[i].y, height);
        if (!p) {
          if (drawing) {
            ctx.stroke();
            ctx.beginPath();
          }
          drawing = false;
          continue;
        }

        if (!drawing) {
          ctx.moveTo(p.x, p.y);
          drawing = true;
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }

      if (drawing) ctx.stroke();
      ctx.restore();
    }

    function drawTrajectory() {
      const all = predictTrajectory();
      if (all.length < 2) return;

      const front = [];
      const back = [];
      const fx = Math.cos(ship.angle);
      const fy = Math.sin(ship.angle);

      for (const p of all) {
        const dx = p.x - ship.x;
        const dy = p.y - ship.y;
        const dot = dx * fx + dy * fy;

        if (dot >= 0) {
          front.push(p);
          back.push(null);
        } else {
          back.push(p);
          front.push(null);
        }
      }

      function splitNulls(arr) {
        const chunks = [];
        let chunk = [];
        for (const p of arr) {
          if (p) chunk.push(p);
          else if (chunk.length) {
            chunks.push(chunk);
            chunk = [];
          }
        }
        if (chunk.length) chunks.push(chunk);
        return chunks;
      }

      for (const c of splitNulls(front)) {
        drawDashedProjectedSegment(c, "rgba(105,230,255,0.9)", 10, 10, 7, "rgba(70,210,255,0.75)");
      }

      for (const c of splitNulls(back)) {
        drawDashedProjectedSegment(c, "rgba(255,160,70,0.9)", 4, 13, 10, "rgba(255,120,30,0.75)");
      }
    }

    function drawPlanet(p) {
      const base = projectWorld(p.x, p.y, 0);
      const top = projectWorld(p.x, p.y, p.r * 1.65);
      if (!base || !top) return;

      const radius = Math.max(4, Math.abs(base.y - top.y) * 0.62);
      if (radius < 2) return;

      const grad = ctx.createRadialGradient(base.x - radius * 0.35, base.y - radius * 0.45, radius * 0.1, base.x, base.y, radius);
      grad.addColorStop(0, p.color1);
      grad.addColorStop(1, p.color2);

      ctx.save();

      ctx.globalAlpha = 0.11;
      ctx.strokeStyle = p.color1;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(base.x, base.y, radius * 1.7, radius * 0.42, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = 1;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(base.x, base.y - radius * 0.45, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.32;
      ctx.strokeStyle = "white";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(base.x, base.y - radius * 0.45, radius, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = 0.78;
      ctx.fillStyle = "white";
      ctx.font = `${Math.max(10, Math.min(13, radius * 0.17))}px system-ui`;
      ctx.textAlign = "center";
      ctx.fillText(p.name, base.x, base.y - radius * 1.65);

      ctx.restore();
    }

    function drawPlanets() {
      const ordered = [...planets].sort((a, b) => {
        const pa = projectWorld(a.x, a.y, 0);
        const pb = projectWorld(b.x, b.y, 0);
        return (pb?.z || 0) - (pa?.z || 0);
      });

      for (const p of ordered) drawPlanet(p);
    }

    function drawShipHUD() {
      const cx = W / 2;
      const cy = H * 0.66;
      const s = 24;

      ctx.save();

      if (ship.thrust > 0.02) {
        const flame = 26 + ship.thrust * 44 + Math.sin(performance.now() * 0.04) * 5;
        const grad = ctx.createLinearGradient(cx, cy + s, cx, cy + s + flame);
        grad.addColorStop(0, `rgba(255,255,255,${0.35 + ship.thrust * 0.55})`);
        grad.addColorStop(0.35, `rgba(255,180,70,${0.25 + ship.thrust * 0.55})`);
        grad.addColorStop(1, "rgba(255,70,20,0.02)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx - 11, cy + s * 0.8);
        ctx.lineTo(cx, cy + s + flame);
        ctx.lineTo(cx + 11, cy + s * 0.8);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = "#eef7ff";
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx - s * 0.72, cy + s * 0.85);
      ctx.lineTo(cx, cy + s * 0.36);
      ctx.lineTo(cx + s * 0.72, cy + s * 0.85);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#6ae5ff";
      ctx.beginPath();
      ctx.arc(cx, cy - 3, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.38;
      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 16, cy - 44);
      ctx.lineTo(cx + 16, cy - 44);
      ctx.moveTo(cx, cy - 60);
      ctx.lineTo(cx, cy - 28);
      ctx.stroke();

      ctx.restore();
    }

    function drawRetrogradeHint() {
      const speed = Math.hypot(ship.vx, ship.vy);
      if (speed < 4) return;

      const vx = ship.vx / speed;
      const vy = ship.vy / speed;

      const retroX = ship.x - vx * 420;
      const retroY = ship.y - vy * 420;
      const p = projectWorld(retroX, retroY, 20);
      if (!p) return;

      ctx.save();
      ctx.globalAlpha = 0.86;
      ctx.strokeStyle = "rgba(255,160,70,0.95)";
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 7]);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x - 18, p.y);
      ctx.lineTo(p.x - 8, p.y);
      ctx.moveTo(p.x + 8, p.y);
      ctx.lineTo(p.x + 18, p.y);
      ctx.moveTo(p.x, p.y - 18);
      ctx.lineTo(p.x, p.y - 8);
      ctx.moveTo(p.x, p.y + 8);
      ctx.lineTo(p.x, p.y + 18);
      ctx.stroke();
      ctx.fillStyle = "rgba(255,190,110,0.95)";
      ctx.font = "11px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("retro", p.x, p.y + 34);
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, W, H);

      drawStars();
      drawGrid();
      drawTrajectory();
      drawPlanets();
      drawRetrogradeHint();
      drawShipHUD();

      const speed = Math.hypot(ship.vx, ship.vy);
      readout.innerHTML = `v ${speed.toFixed(1)}<br>throttle ${(ship.thrust * 100).toFixed(0)}%<br>${input.burnIds.size ? "burning" : "coasting"}`;
      burnVisual.style.opacity = `${0.55 + ship.thrust * 0.45}`;
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
